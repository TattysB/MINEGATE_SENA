<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codigo de verificacion</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family: Arial, sans-serif; color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f6f8; padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px; background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,0.08);">
                    <tr>
                        <td style="background:#00a000; color:#ffffff; text-align:center; padding:22px; font-size:22px; font-weight:700;">
                            Verificacion de cuenta SICAM
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:24px; font-size:15px; line-height:1.6;">
                            <p style="margin:0 0 12px 0;">Hola {{ nombre }},</p>
                            <p style="margin:0 0 16px 0;">Para finalizar la creacion de tu cuenta, ingresa el siguiente codigo de verificacion:</p>
                            <p style="margin:0 0 20px 0; text-align:center;">
                                <span style="display:inline-block; background:#f3f4f6; border:1px solid #d1d5db; border-radius:8px; padding:14px 22px; letter-spacing:6px; font-size:28px; font-weight:700; color:#111827;">{{ codigo }}</span>
                            </p>
                            <p style="margin:0 0 12px 0;">Este codigo vence en {{ minutos }} minutos.</p>
                            <p style="margin:0; color:#6b7280; font-size:13px;">Si no solicitaste esta accion, puedes ignorar este mensaje.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
