{% load static %}

<link rel="stylesheet" href="{% static 'control_acceso_mina/css/porteria.css' %}">

<div class="porteria-module">
  <!-- Header -->
  <div class="porteria-header">
    <div class="porteria-header-left">
      <i class="ri-shield-check-line porteria-icon"></i>
      <div>
        <h2 class="porteria-title">Control de Acceso por Visita</h2>
        <p class="porteria-subtitle">Seleccione una visita para abrir su panel individual de escaneo QR</p>
      </div>
    </div>
  </div>

  <!-- Visitas del día -->
  <div class="porteria-table-section visitas-hoy-section">
    <h3 class="table-title">
      <i class="ri-calendar-check-line"></i> Visitas confirmadas de hoy (abrir control individual)
    </h3>
    <div class="porteria-table-wrapper">
      <table class="porteria-table" id="tablaVisitasHoy">
        <thead>
          <tr>
            <th>Tipo</th>
            <th>Visita</th>
            <th>Responsable</th>
            <th>Horario</th>
            <th>Aprobados</th>
            <th>Abrir</th>
          </tr>
        </thead>
        <tbody id="tablaVisitasHoyBody">
          <tr class="empty-row">
            <td colspan="6">
              <i class="ri-calendar-line"></i> Sin visitas confirmadas para hoy
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="{% static 'control_acceso_mina/js/porteria_selector.js' %}"></script>
