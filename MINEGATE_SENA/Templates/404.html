<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página No Encontrada | SICAM SENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap');
        body {
            font-family: 'Work Sans', sans-serif;
        }
        .bg-sena-verde { background-color: #39A900; }
        .text-sena-verde { color: #39A900; }
        .border-sena-verde { border-color: #39A900; }
        .hover:hover { background-color: #2d8500; }
    </style>
</head>
<body class="antialiased h-screen flex items-center justify-center p-4 bg-gray-50">
    <div class="max-w-xl w-full bg-white shadow-2xl rounded-2xl p-8 md:p-12 text-center border-t-8 border-sena-verde">
        

        <h1 class="text-8xl font-black text-gray-800 mb-2 tracking-tighter">404</h1>
        
        <h2 class="text-2xl font-bold text-sena-verde uppercase mb-6 tracking-wide">Página no encontrada</h2>
        
        <p class="text-gray-600 mb-8 text-lg leading-relaxed">
            Lo sentimos, la página que intentas acceder no existe o ha sido movida.
        </p>

        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <a href="/" class="px-8 py-3 bg-sena-verde text-white font-bold rounded-lg shadow-lg hover:bg-green-700 transition duration-300 transform hover:-translate-y-1">
                <i class="fas fa-home mr-2"></i>Volver al Inicio
            </a>
        </div>
        
        <div class="mt-10 pt-6 border-t border-gray-200">
            <p class="text-xs text-gray-400 font-semibold uppercase tracking-widest">
                SICAM SENA &copy; 2026
            </p>
        </div>
    </div>
</body>
</html>
