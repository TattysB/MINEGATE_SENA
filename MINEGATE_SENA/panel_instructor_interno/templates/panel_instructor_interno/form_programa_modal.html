{% load static %}

<!-- Modal Form - Solo el formulario sin layout completo -->
{% if messages %}
  {% for message in messages %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
      {{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
{% endif %}

<form method="POST" id="formCrearPrograma" style="margin-top: 1rem;">
  {% csrf_token %}
  
  <div class="mb-3">
    <label for="{{ form.nombre.id_for_label }}" style="font-weight: 600; font-size: 0.9rem; color: #374151; margin-bottom: 4px; display: block;">
      Nombre del Programa <span class="text-danger">*</span>
    </label>
    {{ form.nombre }}
    {% if form.nombre.errors %}
      <div class="text-danger small mt-1">{{ form.nombre.errors.0 }}</div>
    {% endif %}
  </div>

  <div class="mb-3">
    <label for="{{ form.descripcion.id_for_label }}" style="font-weight: 600; font-size: 0.9rem; color: #374151; margin-bottom: 4px; display: block;">
      Descripción
    </label>
    {{ form.descripcion }}
  </div>

  <div class="mb-4 form-check">
    {{ form.activo }}
    <label class="form-check-label" for="{{ form.activo.id_for_label }}" style="color: #374151; font-weight: 500;">
      Programa activo
    </label>
  </div>

  <div class="d-flex gap-2 justify-content-end pt-3" style="border-top: 1px solid #e5e7eb;">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" style="border-radius: 50px; padding: 0.5rem 1.5rem; font-weight: 600;">
      <i class="fas fa-times me-1"></i>Cancelar
    </button>
    <button type="submit" class="btn btn-warning text-white" style="border-radius: 50px; padding: 0.5rem 1.5rem; font-weight: 600; background: #f97316; border: none;">
      <i class="fas fa-save me-1"></i>{{ accion }}
    </button>
  </div>
</form>

<style>
  form input[type="text"],
  form textarea,
  form select {
    border-radius: 8px;
    border: 1.5px solid #d1d5db;
    font-size: 0.9rem;
    padding: 0.5rem 0.75rem;
    width: 100%;
  }

  form input[type="text"]:focus,
  form textarea:focus,
  form select:focus {
    border-color: #f97316;
    box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12);
  }

  form textarea {
    resize: vertical;
    min-height: 100px;
  }
</style>
