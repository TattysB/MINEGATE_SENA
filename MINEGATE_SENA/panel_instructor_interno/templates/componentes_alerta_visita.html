

{% load static %}

<link rel="stylesheet" href="{% static 'css/componentes-alerta-visita.css' %}">


<template id="template-alerta-correccion-docs">
    <div class="alerta-estado-visita alerta-correccion-docs">
        <div class="alerta-icono">⚠️</div>
        <div class="alerta-contenido">
            <div class="alerta-titulo">Se requildren Correcciones de Documentos</div>
            <div class="alerta-descripcion">
                Algunos aprendices de tu visita tienen documentos que requieren corrección. 
                Por favor, revisa los detalles abajo y reenvía los documentos solicitados.
            </div>
            <div class="lista-aprendices-problema" id="lista-aprendices-docs">
                
            </div>
            <div class="alerta-acciones">
                <button class="btn-alerta" onclick="irASeccionDocumentos()">
                    📄 Ir a Documentos
                </button>
            </div>
        </div>
    </div>
</template>


<template id="template-alerta-reprogramacion">
    <div class="alerta-estado-visita alerta-reprogramacion">
        <div class="alerta-icono">📅</div>
        <div class="alerta-contenido">
            <div class="alerta-titulo">Reprogramación Solicitada</div>
            <div class="alerta-descripcion">
                Se ha solicitado cambiar la fecha de tu visita. Por favor selecciona una nueva fecha 
                en el calendario y confirma el cambio.
            </div>
            <div class="info-reprogramacion" id="info-reprogramacion">
                
            </div>
            <div class="alerta-acciones">
                <button class="btn-alerta" onclick="abrirModalReprogramacion()">
                    📅 Elegir Nueva Fecha
                </button>
            </div>
        </div>
    </div>
</template>


<div id="modal-reprogramacion" class="modal-reprogramacion">
    <div class="modal-contenido">
        <span class="modal-cerrar" onclick="cerrarModalReprogramacion()">&times;</span>
        <div class="modal-titulo">
            <span>📅</span>
            <span>Reprogramar Visita</span>
        </div>
        <form id="form-reprogramacion">
            <div class="form-grupo">
                <label for="nueva-fecha">Nueva Fecha *</label>
                <input type="date" id="nueva-fecha" required>
            </div>
            <div class="form-grupo">
                <label for="nueva-hora">Nueva Hora *</label>
                <input type="time" id="nueva-hora" required>
            </div>
            <div class="form-grupo">
                <label for="motivo-confirmacion">Motivo de Aceptación (opcional)</label>
                <textarea id="motivo-confirmacion" placeholder="Indica por qué aceptas esta fecha..."></textarea>
            </div>
            <div class="botones">
                <button type="button" class="btn btn-secundario" onclick="cerrarModalReprogramacion()">
                    Cancelar
                </button>
                <button type="submit" class="btn btn-primary">
                    Confirmar Nueva Fecha
                </button>
            </div>
        </form>
    </div>
</div>

<script src="{% static 'js/componentes-alerta-visita.js' %}"></script>
