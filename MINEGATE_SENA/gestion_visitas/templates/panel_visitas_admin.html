<!-- Sección Gestión de Visitas -->
<div id="seccion-gestion-visitas" class="contenido-seccion" style="display: none;">
  <div style="padding: 20px;">
    <div
      style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
      <h2 style="color: #1f2937; margin: 0; display: flex; align-items: center; gap: 10px;">
        <i class="ri-calendar-check-line" style="color: #10b981;"></i>
        Gestión de Visitas
      </h2>
    </div>

    <!-- Tabs para tipo de visita -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
      <button class="tab-visita active" data-tipo="internas" onclick="cambiarTabVisita('internas')"
        style="padding: 10px 20px; border: none; background: #059669; color: white; border-radius: 8px; cursor: pointer; font-weight: 500;">
        📋 Visitas Internas (SENA)
      </button>
      <button class="tab-visita" data-tipo="externas" onclick="cambiarTabVisita('externas')"
        style="padding: 10px 20px; border: none; background: #e5e7eb; color: #374151; border-radius: 8px; cursor: pointer; font-weight: 500;">
        🏢 Visitas Externas
      </button>
    </div>

    <!-- Filtros -->
    <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;">
      <select id="filtroEstadoVisita" onchange="filtrarVisitas()"
        style="padding: 10px 15px; border: 1px solid #d1d5db; border-radius: 8px; background: white;">
        <option value="todos">Todos los estados</option>
        <option value="enviada_coordinacion">🕒 Pendiente aprobación por coordinación</option>
        <option value="pendiente">⏳ Pendientes</option>
        <option value="aprobadas">✅ Aprobadas</option>
        <option value="aprobada_inicial">✅ Aprobadas (registro habilitado)</option>
        <option value="en_revision_documentos">🔍 En revisión de documentos</option>
        <option value="rechazada">❌ Rechazadas</option>
      </select>
      <input type="text" id="buscarVisita" placeholder="Buscar por responsable, institución..." onkeyup="filtrarVisitas()"
        style="padding: 10px 15px; border: 1px solid #d1d5db; border-radius: 8px; width: 300px;">
      <button onclick="cargarVisitas()"
        style="padding: 10px 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer;">
        <i class="ri-refresh-line"></i> Actualizar
      </button>
    </div>

    <!-- Estadísticas -->
    <div id="estadisticasVisitas"
      style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px;">
      <div
        style="background: linear-gradient(135deg, #fef3c7, #fcd34d); padding: 15px; border-radius: 10px; text-align: center; cursor:pointer;"
        onclick="filtrarPorEstado('pendiente')">
        <div style="font-size: 24px; font-weight: bold; color: #92400e;" id="statPendientes">0</div>
        <div style="color: #92400e; font-size: 12px;">⏳ Pendientes</div>
      </div>
      <div
        style="background: linear-gradient(135deg, #bbf7d0, #86efac); padding: 15px; border-radius: 10px; text-align: center; cursor:pointer;"
        onclick="filtrarPorEstado('aprobadas')">
        <div style="font-size: 24px; font-weight: bold; color: #166534;" id="statAprobadas">0</div>
        <div style="color: #166534; font-size: 12px;">✅ Aprobadas</div>
      </div>

      <div
        style="background: linear-gradient(135deg, #fef3c7, #f59e0b); padding: 15px; border-radius: 10px; text-align: center; cursor:pointer; position:relative;"
        onclick="filtrarPorEstado('en_revision_documentos')">
        <div style="font-size: 24px; font-weight: bold; color: #78350f;" id="statEnRevision">0</div>
        <div style="color: #78350f; font-size: 12px;">🔍 Pendientes Revisión</div>
        <div id="statEnRevisionArchivos"
          style="color:#78350f;font-size:10px;margin-top:3px;font-weight:500;opacity:0.8;"></div>
        <div id="badgeEnRevision"
          style="display:none;position:absolute;top:-5px;right:-5px;background:#ef4444;color:white;border-radius:50%;width:20px;height:20px;font-size:11px;line-height:20px;">
        </div>
      </div>

      <div
        style="background: linear-gradient(135deg, #fee2e2, #fca5a5); padding: 15px; border-radius: 10px; text-align: center; cursor:pointer;"
        onclick="filtrarPorEstado('rechazada')">
        <div style="font-size: 24px; font-weight: bold; color: #991b1b;" id="statRechazadas">0</div>
        <div style="color: #991b1b; font-size: 12px;">❌ Rechazadas</div>
      </div>
    </div>

    {% include 'documentos/panel_documentos_visitas.html' %}

    <!-- Tabla de visitas -->
    <div id="contenedorTablaVisitas" class="docs-tabla-contenedor gv-tabla-contenedor">
      <div class="docs-tabla-scroll">
        <table class="docs-tabla gv-tabla" id="tablaVisitas">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tipo</th>
              <th>Responsable</th>
              <th>Institución/Programa</th>
              <th>Fecha Solicitud</th>
              <th>Cantidad</th>
              <th>Estado</th>
              <th style="text-align: center;">Acciones</th>
            </tr>
          </thead>
          <tbody id="cuerpoTablaVisitas">
            <tr>
              <td colspan="8" class="docs-cargando">
                <i class="ri-loader-4-line"></i>
                <p>Cargando visitas...</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal Ver Detalle -->
<div id="modalDetalleVisita"
  style="display:none;position:fixed;z-index:9999;left:0;top:0;width:100%;height:100%;background-color:rgba(15,23,42,0.6);backdrop-filter:blur(3px);">
  <div
    style="background:#fff;margin:2.5% auto;padding:0;border-radius:16px;width:780px;max-width:95%;max-height:88vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.25);display:flex;flex-direction:column;">
    <!-- Header del modal -->
    <div style="background:linear-gradient(135deg,#16a34a,#22c55e);padding:20px 24px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="background:rgba(255,255,255,0.2);border-radius:10px;width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;">
          <i class="ri-file-search-line" style="color:white;font-size:18px;"></i>
        </span>
        <div>
          <div style="font-size:11px;color:rgba(255,255,255,0.75);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;">Gestión de Visitas</div>
          <h3 style="margin:0;color:white;font-size:16px;font-weight:700;">Detalle de Visita #<span id="detalleVisitaId"></span></h3>
        </div>
      </div>
      <button onclick="cerrarModalDetalle()"
        style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);width:34px;height:34px;border-radius:8px;cursor:pointer;color:white;font-size:20px;display:inline-flex;align-items:center;justify-content:center;line-height:1;transition:background .2s;"
        onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(255,255,255,0.15)'">&times;</button>
    </div>
    <!-- Cuerpo del modal -->
    <div style="padding:24px;overflow-y:auto;flex:1;" id="contenidoDetalleVisita">
      <!-- Se llena dinámicamente -->
    </div>
  </div>
</div>
