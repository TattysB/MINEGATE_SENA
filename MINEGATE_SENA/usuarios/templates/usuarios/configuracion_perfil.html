{%extends 'core/panel_administrativo.html' %}
{% load static %} {% block content %}
<link rel="stylesheet" href="{% static 'css/configuracion_perfil.css' %}" />

<div class="modal-perfil-overlay">
  <div class="modal-perfil-card">
    <div class="modal-header-perfil">
      <h3>Mi Perfil</h3>
      <a href="{% url 'core:panel_administrativo' %}" class="btn-close-perfil">&times;</a>
    </div>

    <div class="modal-body-perfil">
      <div class="perfil-avatar-container">
        {% if perfil and perfil.foto_perfil %}
        <img src="{{ perfil.foto_perfil.url }}" alt="Foto de perfil" class="perfil-avatar" />
        {% else %}
        <img src="{% static 'core/img/usuario.png' %}" alt="Foto de perfil" class="perfil-avatar" />
        {% endif %}
      </div>

      <h2 class="perfil-nombre">{{ request.user.get_full_name|default:request.user.username }}</h2>
      <p class="perfil-email">{{ request.user.email }}</p>

      <div class="perfil-acciones">
        <a href="{% url 'usuarios:perfil' %}" class="btn-perfil-action btn-verde">
          <span class="action-left"><i class="ri-edit-box-line"></i> Editar Perfil</span>
          <i class="ri-arrow-right-s-line action-right"></i>
        </a>
        <a href="{% url 'usuarios:cambiar_contraseña' %}" class="btn-perfil-action btn-gris">
          <span class="action-left"><i class="ri-lock-line"></i> Cambiar Contraseña</span>
          <i class="ri-arrow-right-s-line action-right"></i>
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
