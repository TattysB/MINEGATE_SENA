{% load static %}

<link rel="stylesheet" href="{% static 'core/css/custom_modal.css' %}?v=20260311a">


<div class="minegate-acc-trigger" onclick="toggleAccPanel()" title="Opciones de Accesibilidad">
    <i class="fas fa-universal-access fa-2x"></i>
</div>


<div id="accPanel" class="acc-widget-panel" style="display: none; max-height: 80vh; overflow-y: auto;">
    <h5 class="text-dark">Herramientas de Accesibilidad</h5>
    <div class="acc-btn-group">
        <button class="acc-opt" onclick="handleTextToSpeech()">
            <span>Escuchar texto</span> 
            <i class="fas fa-volume-up"></i>
        </button>
        <button class="acc-opt" onclick="adjustFont(1)">
            <span>Aumentar letra</span> 
            <i class="fas fa-plus"></i>
        </button>
        <button class="acc-opt" onclick="adjustFont(-1)">
            <span>Disminuir letra</span> 
            <i class="fas fa-minus"></i>
        </button>
        <button class="acc-opt" onclick="toggleFeature('extra-spacing')">
            <span>Espacio entre letras</span> 
            <i class="fas fa-arrows-alt-h"></i>
        </button>
        <button class="acc-opt" onclick="handleContrast()">
            <span>Alto contraste</span> 
            <i class="fas fa-adjust"></i>
        </button>
        <button class="acc-opt" onclick="toggleFeature('underline-links')">
            <span>Subrayar enlaces</span> 
            <i class="fas fa-link"></i>
        </button>
        <button class="acc-opt" onclick="toggleFeature('big-cursor')">
            <span>Cursor grande</span> 
            <i class="fas fa-mouse-pointer"></i>
        </button>
        <button class="acc-opt" onclick="toggleReadingGuide()">
            <span>Guía de lectura</span> 
            <i class="fas fa-grip-lines"></i>
        </button>
        <button class="acc-opt bg-danger text-white" onclick="resetAll()">
            <span>Restablecer</span> 
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>
</div>


<div id="reading-guide"></div>



<script src="{% static 'accessibility/js/accessibility.js' %}"></script>
<script src="{% static 'core/js/custom_modal.js' %}?v=20260311a"></script>
