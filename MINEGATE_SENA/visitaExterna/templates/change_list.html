{% extends "admin/change_list.html" %}

{% block content %}
{{ block.super }}


<div id="modalCoordinacion" style="display:none;position:fixed;z-index:9999;left:0;top:0;width:100%;height:100%;background-color:rgba(0,0,0,0.5);">
    <div style="background:#fff;margin:10% auto;padding:30px;border-radius:10px;width:400px;max-width:90%;box-shadow:0 4px 20px rgba(0,0,0,0.3);">
        <h3 style="margin-top:0;color:#8b5cf6;">📨 Enviar a Coordinación</h3>
        <p style="color:#666;">Visita Externa #<span id="modalVisitaId"></span></p>
        <form id="formCoordinacion">
            <input type="hidden" id="modalUrl" value="">
            <label for="correoCoordinacion" style="display:block;margin-bottom:5px;font-weight:bold;">Correo de destino:</label>
            <input type="email" id="correoCoordinacion" name="correo_coordinacion" required 
                   placeholder="ejemplo@correo.com"
                   style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;margin-bottom:15px;box-sizing:border-box;">
            <div style="display:flex;gap:10px;justify-content:flex-end;">
                <button type="button" onclick="cerrarModal()" 
                        style="padding:10px 20px;border:1px solid #ddd;background:#f5f5f5;border-radius:5px;cursor:pointer;">
                    Cancelar
                </button>
                <button type="submit" id="btnEnviar"
                        style="padding:10px 20px;border:none;background:#8b5cf6;color:white;border-radius:5px;cursor:pointer;">
                    Enviar
                </button>
            </div>
        </form>
        <div id="modalMensaje" style="margin-top:15px;padding:10px;border-radius:5px;display:none;"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Event listeners para botones de coordinación
    document.querySelectorAll('.btn-coordinacion').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var visitaId = this.getAttribute('data-visita-id');
            var url = this.getAttribute('data-url');
            document.getElementById('modalVisitaId').textContent = visitaId;
            document.getElementById('modalUrl').value = url;
            document.getElementById('correoCoordinacion').value = '';
            document.getElementById('modalMensaje').style.display = 'none';
            document.getElementById('btnEnviar').disabled = false;
            document.getElementById('btnEnviar').textContent = 'Enviar';
            document.getElementById('modalCoordinacion').style.display = 'block';
        });
    });
    
    // Form submit handler
    document.getElementById('formCoordinacion').addEventListener('submit', function(e) {
        e.preventDefault();
        var url = document.getElementById('modalUrl').value;
        var correo = document.getElementById('correoCoordinacion').value;
        var btnEnviar = document.getElementById('btnEnviar');
        var mensajeDiv = document.getElementById('modalMensaje');
        
        btnEnviar.disabled = true;
        btnEnviar.textContent = 'Enviando...';
        
        // Obtener el token CSRF
        var csrfToken = document.querySelector('[name=csrfmiddlewaretoken]');
        if (!csrfToken) {
            csrfToken = document.querySelector('input[name="csrfmiddlewaretoken"]');
        }
        
        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': csrfToken ? csrfToken.value : ''
            },
            body: 'correo_coordinacion=' + encodeURIComponent(correo)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                mensajeDiv.style.background = '#d1fae5';
                mensajeDiv.style.color = '#065f46';
                mensajeDiv.textContent = data.message;
                mensajeDiv.style.display = 'block';
                setTimeout(function() {
                    location.reload();
                }, 1500);
            } else {
                mensajeDiv.style.background = '#fee2e2';
                mensajeDiv.style.color = '#991b1b';
                mensajeDiv.textContent = data.error;
                mensajeDiv.style.display = 'block';
                btnEnviar.disabled = false;
                btnEnviar.textContent = 'Enviar';
            }
        })
        .catch(error => {
            mensajeDiv.style.background = '#fee2e2';
            mensajeDiv.style.color = '#991b1b';
            mensajeDiv.textContent = 'Error de conexión';
            mensajeDiv.style.display = 'block';
            btnEnviar.disabled = false;
            btnEnviar.textContent = 'Enviar';
        });
    });
    
    // Cerrar modal al hacer clic fuera
    document.getElementById('modalCoordinacion').addEventListener('click', function(e) {
        if (e.target === this) cerrarModal();
    });
});

function cerrarModal() {
    document.getElementById('modalCoordinacion').style.display = 'none';
}
</script>
{% endblock %}
